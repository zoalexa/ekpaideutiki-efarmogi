<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Σενάριο – Πτώση Αυτόματης Ασφάλειας (Under Construction)</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #eef2f6;
  margin:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}
header {
  background:#1e3a5f;
  color:white;
  width:100%;
  padding:20px;
  box-sizing:border-box;
}
main {
  margin-top:40px;
}
h1 {
  font-size:36px;
  color:#1e3a5f;
  margin-bottom:20px;
}
p {
  font-size:20px;
  color:#333;
}
.under-construction {
  width:150px;
  height:150px;
  border:5px dashed #1e3a5f;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  color:#1e3a5f;
  margin:20px auto;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% {transform: scale(1); opacity:1;}
  50% {transform: scale(1.1); opacity:0.7;}
  100% {transform: scale(1); opacity:1;}
}
</style>
</head>
<body>

<header>
<h2>Σενάριο – Πτώση Αυτόματης Ασφάλειας</h2>
</header>

<main>
  <div class="under-construction">🚧</div>
  <h1>Under Construction</h1>
  <p>Η σελίδα είναι υπό κατασκευή.<br>Το σενάριο θα είναι διαθέσιμο σύντομα.</p>
</main>

</body>
</html>
