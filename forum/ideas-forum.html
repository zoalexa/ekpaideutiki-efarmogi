<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>Forum Ιδέες & Προτάσεις</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body { font-family: Arial, sans-serif; background: #f4f7fb; padding: 40px; }
    h1 { text-align: center; }
    .subtitle { text-align: center; color: #555; margin-bottom: 30px; }
    .top-bar { max-width: 900px; margin: auto; display: flex; justify-content: space-between; margin-bottom: 20px; }
    .forum-box { max-width: 900px; margin: auto; }
    .thread { background: white; padding: 20px; margin-bottom: 15px; border-radius: 10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
    .thread h3 { margin: 0; color: #7b1fa2; }
    .thread p { margin: 5px 0; font-size: 14px; color: #444; }
    .thread-info { font-size: 12px; color: #888; margin-bottom: 10px; }
    .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; color: white; margin-right: 5px; }
    .btn-blue { background-color: #1976d2; }
    .btn-green { background-color: #388e3c; }
    .btn-blue:hover { background-color: #0d47a1; }
    .btn-green:hover { background-color: #1b5e20; }
    .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
    .modal { background: white; padding: 30px; border-radius: 10px; max-width: 500px; width: 90%; }
    .modal input, .modal textarea { width: 100%; margin-bottom: 15px; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="forum.html"><button class="btn btn-green">⬅ Επιστροφή</button></a>
  <button class="btn btn-blue" id="newThreadBtn">Νέα Ανάρτηση</button>
</div>

<h1>Forum Ιδέες & Προτάσεις</h1>
<div class="subtitle">Προτάσεις για νέες λειτουργίες, βελτιώσεις και εκπαιδευτικά σενάρια</div>

<div class="forum-box" id="threadsContainer">
  <div class="thread">
    <div class="thread-info">Δημιουργήθηκε από: user4 | 01/03/2026</div>
    <h3>Νέα ιδέα για διαδραστικά κουίζ</h3>
    <p>Θα ήταν ωραίο να έχουμε κουίζ με διαδραστικά κυκλώματα.</p>
    <button class="btn btn-green" onclick="replyThread(this)">Απάντηση</button>
    <div class="replies" style="margin-top:10px;"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Νέα Ανάρτηση</h3>
    <input type="text" id="threadTitle" placeholder="Τίτλος">
    <textarea id="threadContent" rows="4" placeholder="Περιεχόμενο"></textarea>
    <button class="btn btn-blue" onclick="addThread()">Δημιουργία</button>
    <button class="btn btn-green" onclick="closeModal()">Κλείσιμο</button>
  </div>
</div>

<script>
  const modalOverlay = document.getElementById('modalOverlay');
  const newThreadBtn = document.getElementById('newThreadBtn');
  const threadsContainer = document.getElementById('threadsContainer');

  newThreadBtn.onclick = () => { modalOverlay.style.display = 'flex'; }
  function closeModal() { modalOverlay.style.display = 'none'; }

  function addThread() {
    const title = document.getElementById('threadTitle').value;
    const content = document.getElementById('threadContent').value;
    if(title && content) {
      const threadDiv = document.createElement('div');
      threadDiv.className = 'thread';
      threadDiv.innerHTML = `
        <div class="thread-info">Δημιουργήθηκε από: guest | Τώρα</div>
        <h3>${title}</h3>
        <p>${content}</p>
        <button class="btn btn-green" onclick="replyThread(this)">Απάντηση</button>
        <div class="replies" style="margin-top:10px;"></div>
      `;
      threadsContainer.prepend(threadDiv);
      closeModal();
      document.getElementById('threadTitle').value = '';
      document.getElementById('threadContent').value = '';
    } else {
      alert('Συμπλήρωσε τίτλο και περιεχόμενο!');
    }
  }

  function replyThread(btn) {
    const reply = prompt('Γράψε την απάντηση σου:');
    if(reply) {
      const threadDiv = btn.parentElement;
      const repliesDiv = threadDiv.querySelector('.replies');
      const p = document.createElement('p');
      p.textContent = reply;
      p.style.fontSize = '13px';
      p.style.color = '#555';
      repliesDiv.appendChild(p);
    }
  }
</script>

</body>
</html>
